services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma
    command: celery -A app.platform.tasks.worker.celery_app worker -l info

  flower:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - worker
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
    command: celery -A app.platform.tasks.worker.celery_app flower --port=5555

  frontend:
    image: node:20
    working_dir: /app
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1/ws/notifications
      BACKEND_INTERNAL_URL: http://backend:8000
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  pgdata:
  chroma_data:
